name: pytest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e . --no-deps

      - name: Run tests
        run: |
          pytest tests/ -v --cov=augean --cov-report=term-missing

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e . --no-deps

      - name: Run bandit (SAST)
        run: |
          bandit -r augean/ -ll

      - name: Run pip-audit (CVE scan)
        run: |
          pip-audit

  release-artefacts:
    needs: [test, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e . --no-deps

      - name: Generate hashed requirements
        run: |
          pip-compile pyproject.toml --no-strip-extras --generate-hashes --output-file requirements-hashed.txt

      - name: Generate SBOM
        run: |
          cyclonedx-py environment --output-format json --outfile sbom.json

      - name: Upload release artefacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artefacts-${{ github.sha }}
          path: |
            requirements-hashed.txt
            sbom.json
          retention-days: 90
